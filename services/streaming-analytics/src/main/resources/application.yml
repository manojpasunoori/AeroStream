server:
  port: 8086

spring:
  application:
    name: streaming-analytics

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    properties:
      schema.registry.url: ${SCHEMA_REGISTRY_URL:http://schema-registry:8081}

  datasource:
    url: jdbc:postgresql://postgres:5432/aerostream
    username: aerostream
    password: aerostream

  jpa:
    hibernate:
      ddl-auto: update

  data:
    mongodb:
      uri: mongodb://mongo:27017/aerostream

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}
