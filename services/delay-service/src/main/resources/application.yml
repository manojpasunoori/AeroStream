server:
  port: 8083

spring:
  application:
    name: delay-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/airline_ops?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:airline_user}
    password: ${SPRING_DATASOURCE_PASSWORD:airline_pass}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
