name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-java:
    name: Build (Java)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - services/flight-service
          - services/crew-service
          - services/delay-service
          - services/kpi-service
          - services/streaming-analytics
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Ensure Maven
        run: |
          if ! command -v mvn >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y maven
          fi
          mvn -version

      - name: Build
        working-directory: ${{ matrix.service }}
        run: mvn -B -DskipTests package

  build-python:
    name: Build (Python)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/ingestion-service
          - services/flight-simulator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build
        working-directory: ${{ matrix.service }}
        run: python -m compileall app

  build-dashboard:
    name: Build (Dashboard)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm install

      - name: Build
        working-directory: dashboard
        run: npm run build

  test-java:
    name: Test (Java)
    needs: [build-java]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - services/flight-service
          - services/crew-service
          - services/delay-service
          - services/kpi-service
          - services/streaming-analytics
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Ensure Maven
        run: |
          if ! command -v mvn >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y maven
          fi
          mvn -version

      - name: Test
        working-directory: ${{ matrix.service }}
        run: mvn -B test

  test-python:
    name: Test (Python)
    needs: [build-python]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - services/ingestion-service
          - services/flight-simulator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Test
        working-directory: ${{ matrix.service }}
        run: |
          if [ -d tests ]; then
            python -m pytest
          else
            python -m compileall app
          fi

  test-dashboard:
    name: Test (Dashboard)
    needs: [build-dashboard]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm install

      - name: Test
        working-directory: dashboard
        run: npm run test --if-present

  docker-build:
    name: Docker Build
    needs: [test-java, test-python, test-dashboard]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: gateway
            context: gateway
          - name: flight-service
            context: services/flight-service
          - name: crew-service
            context: services/crew-service
          - name: delay-service
            context: services/delay-service
          - name: kpi-service
            context: services/kpi-service
          - name: streaming-analytics
            context: services/streaming-analytics
          - name: ingestion-service
            context: services/ingestion-service
          - name: flight-simulator
            context: services/flight-simulator
          - name: dashboard
            context: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build
        run: docker build -t aerostream/${{ matrix.image.name }}:${{ github.sha }} ./${{ matrix.image.context }}

  docker-push:
    name: Docker Push (GHCR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [docker-build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: gateway
            context: gateway
          - name: flight-service
            context: services/flight-service
          - name: crew-service
            context: services/crew-service
          - name: delay-service
            context: services/delay-service
          - name: kpi-service
            context: services/kpi-service
          - name: streaming-analytics
            context: services/streaming-analytics
          - name: ingestion-service
            context: services/ingestion-service
          - name: flight-simulator
            context: services/flight-simulator
          - name: dashboard
            context: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.image.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/aerostream-${{ matrix.image.name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/aerostream-${{ matrix.image.name }}:latest

