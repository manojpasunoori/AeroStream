server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      default-filters:
        # 1) Enforce API key at gateway (only if API_KEY env var is set)
        - name: ApiKeyFilter

        # 2) Add correlation id header for downstream services
        - AddRequestHeader=X-Correlation-Id, #{T(java.util.UUID).randomUUID().toString()}

      routes:
        - id: flight-service
          uri: http://flight-service:8081
          predicates:
            - Path=/api/flights/**

        - id: crew-service
          uri: http://crew-service:8082
          predicates:
            - Path=/api/crew/**

        - id: delay-service
          uri: http://delay-service:8083
          predicates:
            - Path=/api/delays/**

        - id: kpi-service
          uri: http://kpi-service:8084
          predicates:
            - Path=/api/kpis/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
