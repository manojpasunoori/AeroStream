server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: flight
          uri: http://flight-service:8081
          predicates:
            - Path=/api/flights/**
        - id: crew
          uri: http://crew-service:8082
          predicates:
            - Path=/api/crew/**
        - id: delays
          uri: http://delay-service:8083
          predicates:
            - Path=/api/delays/**
        - id: kpis
          uri: http://kpi-service:8084
          predicates:
            - Path=/api/kpis/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
